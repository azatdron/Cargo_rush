<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2ea8ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cargo Rush" />
  <title>Cargo Rush</title>
  <style>
    :root{--w:430px;--blue:#1f8fff;--nav:#0b315b;--green:#69c83d;--dark:#11233f;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;min-height:100%;background:#000;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden;color:#102342;}
    body{display:flex;justify-content:center;align-items:flex-start;}
    .app{position:relative;width:100%;max-width:var(--w);min-height:100vh;background:#8edcff;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
    .bg{display:block;width:100%;height:auto;user-select:none;pointer-events:none;}
    .safeTop{position:absolute;left:0;right:0;top:0;height:env(safe-area-inset-top);background:#2da3ff;}
    .hud{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;}
    .coinOverlay{position:absolute;right:112px;top:42px;width:98px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#14253d;pointer-events:none;}
    .gemOverlay{position:absolute;right:17px;top:42px;width:86px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#14253d;pointer-events:none;}
    .timerBox{position:absolute;left:88px;right:88px;top:566px;text-align:center;font-weight:900;font-size:27px;color:#102342;letter-spacing:1px;text-shadow:0 2px 0 rgba(255,255,255,.65);}
    .startPanel{position:absolute;left:24px;right:24px;top:639px;height:72px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;}
    .rewardText{padding-left:30px;font-weight:900;font-size:28px;color:#2c9a50;text-shadow:0 2px 0 #fff;}
    .btn{margin-left:auto;margin-right:3px;width:150px;height:48px;border:0;border-radius:15px;background:linear-gradient(#79dc46,#46b721);box-shadow:inset 0 2px rgba(255,255,255,.5),0 5px 0 #2b8518,0 8px 12px rgba(0,0,0,.25);font-weight:900;font-size:20px;color:white;text-shadow:0 2px rgba(0,0,0,.25);}
    .btn:active{transform:translateY(4px);box-shadow:inset 0 2px rgba(255,255,255,.5),0 1px 0 #2b8518,0 3px 8px rgba(0,0,0,.25)}
    .btn.go{background:linear-gradient(#73d8ff,#2394ff);box-shadow:inset 0 2px rgba(255,255,255,.5),0 5px 0 #1266bd,0 8px 12px rgba(0,0,0,.25)}
    .progressFill{position:absolute;left:86px;right:auto;top:523px;height:10px;width:0;border-radius:20px;background:linear-gradient(90deg,#63c84a,#9be861);box-shadow:0 1px 3px rgba(0,0,0,.35);transition:width .4s linear;}
    .truckDot{position:absolute;left:190px;top:502px;width:36px;height:30px;transition:left .4s linear;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));}
    .truckDot svg{width:100%;height:100%}
    .tapZones button{position:absolute;background:transparent;border:0;color:transparent;pointer-events:auto;}
    .tapGarage{left:13px;bottom:14px;width:110px;height:70px}.tapOrders{left:132px;bottom:14px;width:92px;height:70px}.tapShop{left:234px;bottom:14px;width:92px;height:70px}.tapTop{right:14px;bottom:14px;width:90px;height:70px}
    .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);max-width:330px;width:calc(100% - 44px);padding:13px 16px;border-radius:18px;background:rgba(13,45,84,.93);color:white;font-weight:800;text-align:center;opacity:0;transition:.25s;z-index:10;box-shadow:0 12px 30px rgba(0,0,0,.3)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:20}.modal.show{display:flex}.sheet{width:100%;max-width:430px;background:#fff5df;border-radius:26px 26px 0 0;padding:22px 18px 30px;border:4px solid #ffffff;box-shadow:0 -10px 35px rgba(0,0,0,.35);color:#14253d}.sheet h2{margin:0 0 14px;font-size:28px}.row{display:flex;justify-content:space-between;gap:12px;padding:13px 4px;border-bottom:1px solid rgba(0,0,0,.12);font-size:18px}.row b{font-size:20px}.close{width:100%;height:52px;margin-top:18px;border:0;border-radius:16px;background:linear-gradient(#4aa7ff,#156dd3);color:#fff;font-size:20px;font-weight:900;box-shadow:0 4px 0 #0b4c98}
    @media (max-width:380px){.timerBox{top:528px;font-size:24px}.startPanel{top:595px}.progressFill{top:488px}.truckDot{top:467px}.coinOverlay{top:38px}.gemOverlay{top:38px}}
  </style>
</head>
<body>
  <main class="app">
    <img class="bg" src="assets/render_bg.png" alt="Cargo Rush" />
    <div class="hud">
      <div class="coinOverlay" id="coins">0</div>
      <div class="gemOverlay" id="stars">0</div>
      <div class="progressFill" id="fill"></div>
      <div class="truckDot" id="dot"><svg viewBox="0 0 80 50"><rect x="8" y="18" width="44" height="22" rx="4" fill="#f5f5ef" stroke="#18324e" stroke-width="4"/><rect x="51" y="25" width="18" height="15" rx="3" fill="#f5f5ef" stroke="#18324e" stroke-width="4"/><circle cx="25" cy="43" r="6" fill="#18324e"/><circle cx="58" cy="43" r="6" fill="#18324e"/></svg></div>
      <div class="timerBox" id="timer">00:30:00</div>
      <div class="startPanel">
        <div class="rewardText" id="reward">+10</div>
        <button class="btn go" id="mainBtn">ПОЕХАЛИ</button>
      </div>
      <div class="tapZones">
        <button class="tapGarage" data-modal="garage">garage</button>
        <button class="tapOrders" data-modal="garage">orders</button>
        <button class="tapShop" data-modal="shop">shop</button>
        <button class="tapTop" data-modal="top">top</button>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <div class="modal" id="modal"><div class="sheet"><h2 id="mTitle"></h2><div id="mBody"></div><button class="close" id="close">ЗАКРЫТЬ</button></div></div>
<script>
  const stateKey='cargo-rush-v03';
  let s=JSON.parse(localStorage.getItem(stateKey)||'{}');
  s.coins=s.coins||0; s.stars=s.stars||0; s.running=s.running||false; s.endsAt=s.endsAt||0; s.duration=s.duration||30*60; s.reward=s.reward||10;
  const coins=document.getElementById('coins'), stars=document.getElementById('stars'), timer=document.getElementById('timer'), fill=document.getElementById('fill'), dot=document.getElementById('dot'), btn=document.getElementById('mainBtn'), reward=document.getElementById('reward');
  function save(){localStorage.setItem(stateKey,JSON.stringify(s))}
  function fmt(sec){sec=Math.max(0,Math.ceil(sec)); const h=String(Math.floor(sec/3600)).padStart(2,'0'), m=String(Math.floor(sec%3600/60)).padStart(2,'0'), x=String(sec%60).padStart(2,'0'); return h+':'+m+':'+x}
  function render(){coins.textContent=s.coins.toLocaleString('ru-RU');stars.textContent=s.stars;reward.textContent='+'+s.reward;let now=Date.now(); if(s.running){let left=(s.endsAt-now)/1000; if(left<=0){timer.textContent='00:00:00'; fill.style.width='255px'; dot.style.left='285px'; btn.textContent='ЗАБРАТЬ'; btn.classList.remove('go');} else {timer.textContent=fmt(left); let p=1-left/s.duration; fill.style.width=(255*p)+'px'; dot.style.left=(190+95*p)+'px'; btn.textContent='В ПУТИ'; btn.classList.remove('go');}} else {timer.textContent=fmt(s.duration); fill.style.width='0px'; dot.style.left='190px'; btn.textContent='ПОЕХАЛИ'; btn.classList.add('go');}}
  btn.onclick=()=>{let now=Date.now(); if(s.running && now>=s.endsAt){s.coins+=s.reward; s.running=false; s.endsAt=0; toast('Награда забрана: +'+s.reward+' Cargo'); save(); render(); return;} if(s.running){toast('Машина уже в пути'); return;} s.running=true; s.endsAt=Date.now()+s.duration*1000; toast('Рейс запущен'); save(); render();}
  setInterval(render,1000); render();
  function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(window.__to);window.__to=setTimeout(()=>el.classList.remove('show'),1700)}
  const modal=document.getElementById('modal'), mt=document.getElementById('mTitle'), mb=document.getElementById('mBody'); document.getElementById('close').onclick=()=>modal.classList.remove('show');
  document.querySelectorAll('[data-modal]').forEach(b=>b.onclick=()=>{let type=b.dataset.modal; if(type==='shop'){mt.textContent='Магазин';mb.innerHTML='<div class="row"><b>Mini Van</b><span>$10</span></div><div class="row"><b>Cargo Truck</b><span>$25</span></div><div class="row"><b>Heavy Truck</b><span>$100</span></div><div class="row"><b>Комиссия рынка</b><span>5%</span></div>';} else if(type==='top'){mt.textContent='Лидеры недели';mb.innerHTML='<div class="row"><b>RoadKing</b><span>248 500 Cargo</span></div><div class="row"><b>TruckBoss</b><span>201 900 Cargo</span></div><div class="row"><b>Azat</b><span>174 300 Cargo</span></div>';} else {mt.textContent='Гараж';mb.innerHTML='<div class="row"><b>Mini Van</b><span>Lv. 1</span></div><div class="row"><b>Рейс</b><span>30 минут</span></div><div class="row"><b>Награда</b><span>10 Cargo</span></div><div class="row"><b>Следующий слот</b><span>$5</span></div>';} modal.classList.add('show');});
</script>
</body>
</html>
