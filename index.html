<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Cargo Rush v04.14 Full Clean</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#061b35;font-family:Arial,Helvetica,sans-serif;color:#0e2546;overflow-x:hidden}
body{display:flex;justify-content:center}
.app{position:relative;width:100%;max-width:430px;min-height:100vh;background:linear-gradient(#23a7ff 0,#9ee7c1 72%,#082b52 72%);overflow:hidden;padding:calc(env(safe-area-inset-top) + 12px) 8px calc(env(safe-area-inset-bottom) + 92px)}
.top{display:grid;grid-template-columns:1.1fr .9fr .82fr 48px;gap:8px;align-items:center;margin-bottom:10px}
.card{background:linear-gradient(#fff,#eaf5ff);border:2px solid rgba(255,255,255,.9);border-radius:16px;box-shadow:0 3px 0 rgba(0,0,0,.15);}
.player{height:56px;display:flex;align-items:center;gap:8px;padding:6px 8px}
.avatar{width:44px;height:44px;border-radius:10px;overflow:hidden;background:#8ed6ff;border:2px solid #358ee2}
.avatar img{width:100%;height:100%;object-fit:cover}
.playerName{font-size:16px;font-weight:900;line-height:1.05}
.badge{display:inline-block;background:#5ec242;color:white;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:900;margin-top:5px}
.wallet{height:56px;display:flex;align-items:center;gap:8px;justify-content:center;padding:0 8px;font-weight:900;font-size:18px}
.coin,.gem{width:35px;height:35px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#8b4c00;background:radial-gradient(circle at 35% 30%,#ffe875,#f4a900 68%,#c77a00);border:2px solid #d99209}
.gem{border-radius:10px;transform:rotate(45deg);background:linear-gradient(135deg,#a9f5ff,#20a4ff,#0a5fc5);border-color:#0d74da}
.gem span{transform:rotate(-45deg);font-size:0}
.plus{margin-left:auto;width:28px;height:28px;border-radius:7px;background:linear-gradient(#75db5e,#28a819);color:#fff;display:grid;place-items:center;font-size:23px;line-height:1;font-weight:900;box-shadow:inset 0 2px rgba(255,255,255,.45),0 2px 0 #17750e}
.settings{height:56px;display:grid;place-items:center;font-size:28px;color:#667;background:linear-gradient(#fff,#eaf5ff);border-radius:15px;border:2px solid rgba(255,255,255,.9);box-shadow:0 3px 0 rgba(0,0,0,.15)}
.settings:before{content:"";width:28px;height:28px;border-radius:50%;border:7px solid #6b7280;box-shadow:0 0 0 2px #d8e0ea inset}
.logo{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 7px);transform:translateX(-50%);font-size:18px;color:white;font-weight:900;text-shadow:0 2px 4px rgba(0,0,0,.28);letter-spacing:.5px;pointer-events:none;display:flex;align-items:center;gap:6px}
.logoTruck{width:30px;height:18px;background:#fff;border-radius:3px;position:relative;box-shadow:0 2px 0 rgba(0,0,0,.18)}
.logoTruck:before{content:"";position:absolute;right:-9px;bottom:0;width:10px;height:11px;background:#fff;border-radius:2px}
.logoTruck:after{content:"";position:absolute;left:5px;bottom:-5px;width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:26px 0 0 #fff}
.vehicle{width:245px;height:128px;margin:0 0 8px 2px;display:flex;padding:10px;gap:12px;align-items:center;background:#fff8ea;border:2px solid rgba(255,255,255,.95);border-radius:18px;box-shadow:0 3px 0 rgba(0,0,0,.13)}
.vehicleImg{width:96px;height:96px;border-radius:12px;background:#dff2ff;display:grid;place-items:center;overflow:hidden}
.vehicleImg img{width:96%;height:auto}
.vehicle h1{font-size:23px;margin:0 0 6px;line-height:1.05}
.vehicle p{margin:8px 0 2px;font-size:16px;color:#34435a}
.income{display:flex;align-items:center;gap:8px;font-weight:900;font-size:21px}

.label{position:absolute;background:rgba(13,35,61,.82);color:white;border-radius:9px;padding:8px 12px;font-size:18px;font-weight:900;letter-spacing:.3px}
.label.storage{left:10px;top:128px}
.label.city{right:18px;top:128px}
.mainTruck{position:absolute;left:43%;top:115px;transform:translate(-50%,-50%);width:165px;display:none}
.route{height:120px;margin-top:-8px;padding:12px 14px;background:#fff8ea;border:2px solid rgba(255,255,255,.95);border-radius:18px;box-shadow:0 3px 0 rgba(0,0,0,.13);position:relative;z-index:2}
.routeTitle{text-align:center;font-size:22px;font-weight:900;margin:0 0 7px}
.routeRow{display:grid;grid-template-columns:60px 1fr 60px;align-items:center;gap:8px}
.routeSide{text-align:center;font-weight:900;font-size:13px}
.roundIcon{width:42px;height:42px;border-radius:50%;background:#2188ed;margin:6px auto 0;display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 3px 0 rgba(0,0,0,.16)}
.roundIcon.red{background:#f04756}
.track{position:relative;height:18px;background:#d6d0c5;border-radius:20px;box-shadow:inset 0 2px 4px rgba(0,0,0,.18)}
.fill{height:100%;width:44%;border-radius:20px;background:linear-gradient(90deg,#45bf25,#75d848)}
.miniTruck{position:absolute;left:43%;top:-18px;width:48px;transform:translateX(-50%)}
.timeLabel{font-size:13px;text-align:center;color:#68707b;margin-top:8px;font-weight:700}
.timer{margin:0 auto;width:118px;height:30px;line-height:30px;text-align:center;background:rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.1);border-radius:9px;font-size:24px;font-weight:900;letter-spacing:.5px}
.rewardBar{height:74px;margin-top:8px;padding:12px 16px;background:#eaffdf;border:2px solid rgba(255,255,255,.92);border-radius:18px;box-shadow:0 3px 0 rgba(0,0,0,.13);display:flex;align-items:center;justify-content:space-between}
.rewardTitle{font-weight:900;font-size:20px;color:#126a2f;margin-bottom:5px}
.rewardAmount{display:flex;align-items:center;gap:8px;font-size:24px;font-weight:900;color:#16843c}
.mainBtn{border:0;border-radius:15px;width:170px;height:50px;background:linear-gradient(#78d64d,#34b917);color:white;font-size:24px;font-weight:900;box-shadow:inset 0 2px rgba(255,255,255,.55),0 5px 0 #208715,0 8px 13px rgba(0,0,0,.22);text-shadow:0 2px rgba(0,0,0,.16)}
.mainBtn.ready{background:linear-gradient(#74dffb,#238df5);box-shadow:inset 0 2px rgba(255,255,255,.55),0 5px 0 #1268ba,0 8px 13px rgba(0,0,0,.22)}
.mainBtn:active,.buyGarage:active{transform:translateY(4px);box-shadow:inset 0 2px rgba(255,255,255,.55),0 1px 0 rgba(0,0,0,.25)}
.garage{height:155px;margin-top:10px;padding:14px 14px 12px;background:#fff8ea;border:2px solid rgba(255,255,255,.95);border-radius:18px;box-shadow:0 3px 0 rgba(0,0,0,.13);position:relative}
.garageHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.garageTitle{font-size:23px;font-weight:900}
.buyGarage{border:0;border-radius:11px;background:linear-gradient(#45b7ff,#137ee4);color:#fff;font-size:14px;font-weight:900;padding:9px 12px;box-shadow:inset 0 2px rgba(255,255,255,.5),0 4px 0 #1168c1}
.carGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.carSlot{position:relative;height:82px;border:2px solid #d5cec0;border-radius:12px;background:#eee8dd;display:flex;align-items:center;justify-content:center;overflow:hidden}
.carSlot.active{background:#e9ffe1;border-color:#52bf58}
.carSlot.empty{border:2px dashed #bcb5a9;background:#fff8ea;color:#777;font-size:46px;font-weight:300}
.garageTruck{width:92%;height:auto;display:block}
.lv{position:absolute;left:5px;bottom:5px;background:#2fb44f;color:white;border-radius:6px;padding:3px 7px;font-size:14px;font-weight:900;z-index:3}
.lock{position:absolute;right:6px;bottom:6px;width:28px;height:28px;border-radius:50%;background:rgba(80,86,92,.82);z-index:3}
.lock:before{content:"";position:absolute;left:8px;top:6px;width:12px;height:9px;border:3px solid #fff;border-bottom:0;border-radius:9px 9px 0 0}
.lock:after{content:"";position:absolute;left:7px;top:14px;width:14px;height:10px;background:#fff;border-radius:2px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;height:82px;padding:8px 10px calc(env(safe-area-inset-bottom) + 6px);background:linear-gradient(#0d3b68,#071d39);display:grid;grid-template-columns:repeat(5,1fr);gap:5px;z-index:20}
.navBtn{border:0;background:transparent;color:#dfeeff;border-radius:16px;font-weight:900;font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.navBtn.active{background:linear-gradient(#168dff,#0766d5);color:#fff;box-shadow:inset 0 2px rgba(255,255,255,.34),0 4px 0 #0753aa}
.navI{width:24px;height:18px;background:#dfeeff;border-radius:3px;position:relative;opacity:.95}
.navBtn.active .navI{background:#fff}
.modal{position:fixed;inset:0;background:rgba(4,16,32,.55);z-index:30;display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{width:100%;max-width:430px;background:#fff8ea;border-radius:22px 22px 0 0;padding:20px;color:#112443;box-shadow:0 -10px 30px rgba(0,0,0,.25)}
.sheet h2{margin:0 0 12px;font-size:26px}
.sheet p{font-size:17px;line-height:1.35}
.close{width:100%;height:48px;border:0;border-radius:14px;background:#168dff;color:#fff;font-weight:900;font-size:18px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);padding:12px 18px;background:rgba(12,33,58,.95);color:white;border-radius:14px;font-weight:900;opacity:0;transition:.25s;z-index:40}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:380px){.wallet{font-size:15px}.vehicle{width:230px}.mainBtn{width:150px;font-size:22px}.garageTitle{font-size:21px}.buyGarage{font-size:13px;padding:8px}}
</style>
</head>

<script>
const state={running:false,done:false,total:30*60,left:30*60,cargo:2450,stars:120,tick:null};
const $=s=>document.querySelector(s);
function fmt(s){s=Math.max(0,Math.floor(s));let h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),x=String(s%60).padStart(2,'0');return `${h}:${m}:${x}`;}
function render(){$('#coins').textContent=state.cargo.toLocaleString('en-US');$('#stars').textContent=state.stars;$('#timer').textContent=fmt(state.left);let p=1-state.left/state.total;$('#progressFill').style.width=(44+Math.max(0,p)*52)+'%';$('#routeTruck').style.left=(43+Math.max(0,p)*47)+'%';if(state.running){$('#routeTitle').textContent='Рейс выполняется';$('#mainBtn').textContent='В ПУТИ';$('#mainBtn').classList.remove('ready');}else if(state.done){$('#routeTitle').textContent='Рейс завершён';$('#mainBtn').textContent='ЗАБРАТЬ';$('#mainBtn').classList.remove('ready');}else{$('#routeTitle').textContent='Машина стоит';$('#mainBtn').textContent='ПОЕХАЛИ';$('#mainBtn').classList.add('ready');}}
function startRide(){if(state.running)return;if(state.done){state.cargo+=120;state.done=false;state.left=state.total;toast('+120 Cargo');render();return;}state.running=true;state.left=state.total;render();state.tick=setInterval(()=>{state.left--;if(state.left<=0){clearInterval(state.tick);state.running=false;state.done=true;state.left=0;toast('Рейс завершён');}render();},1000);}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}
const content={garage:['Гараж','Здесь будет список всех машин, слоты гаража и прокачка. Сейчас главный блок гаража уже собран чистым HTML без старых слоёв.'],shop:['Автосалон','Покупка новых машин, редкие цвета, лицензии и расширение гаража.'],top:['Топ недели','Рейтинг игроков недели и награды за активность.'],ref:['Рефералы','Твоя реферальная ссылка и бонусы за приглашённых игроков.'],home:['Главная','Главный экран Cargo Rush.']};
document.querySelectorAll('[data-modal]').forEach(b=>b.addEventListener('click',()=>{let key=b.dataset.modal;if(key==='home'){document.querySelectorAll('.navBtn').forEach(n=>n.classList.remove('active'));b.classList.add('active');return;}let c=content[key]||content.home;$('#mTitle').textContent=c[0];$('#mBody').innerHTML='<p>'+c[1]+'</p>';$('#modal').classList.add('show');}));
$('#mainBtn').addEventListener('click',startRide);
$('#buyCar').addEventListener('click',()=>{$('#mTitle').textContent='Купить машину';$('#mBody').innerHTML='<p>Скоро здесь будет автосалон: Mini Van, Cargo Truck, Heavy Truck и рынок машин.</p>';$('#modal').classList.add('show');});
$('#settings').addEventListener('click',()=>{$('#mTitle').textContent='Настройки';$('#mBody').innerHTML='<p>Настройки профиля, языка и Telegram Mini App.</p>';$('#modal').classList.add('show');});
$('#close').addEventListener('click',()=>$('#modal').classList.remove('show'));
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')});
render();
</script>
</body>
</html>
