<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#3aa8ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cargo Rush" />
<title>Cargo Rush</title>
<style>
:root{--w:430px;--blue:#2497f6;--deep:#0b315b;--txt:#10223e;--green:#67c942;--cream:#fff6e5;--line:#d6cdb8;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;font-family:Arial,Helvetica,sans-serif;color:var(--txt);}
body{display:flex;justify-content:center;}
.app{position:relative;width:100%;max-width:var(--w);min-height:100vh;background:linear-gradient(#39a9ff 0,#77d7ff 45%,#b4ed9c 72%,#123b68 72%);overflow:hidden;padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 84px);}
.logo{position:relative;margin:0 auto 8px;width:218px;height:42px;border-radius:22px;background:linear-gradient(#f8fbff,#d6dce2);box-shadow:inset 0 2px #fff,0 4px 0 rgba(0,0,0,.18),0 5px 14px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;gap:9px;font-weight:900;letter-spacing:1px;font-size:19px;z-index:4}
.logoTruck{width:42px;height:22px;position:relative;background:#1d84d8;border-radius:4px 4px 3px 3px;box-shadow:0 3px 0 rgba(0,0,0,.12)}
.logoTruck:before{content:"";position:absolute;left:4px;bottom:-8px;width:8px;height:8px;background:#102342;border-radius:50%;box-shadow:25px 0 0 #102342}
.top{display:grid;grid-template-columns:1.38fr 1fr 1fr 52px;gap:8px;align-items:center;margin-bottom:8px;}
.card{background:linear-gradient(#fff,#eef8ff);border:3px solid rgba(255,255,255,.95);border-radius:18px;box-shadow:0 4px 0 rgba(0,0,0,.12),0 5px 12px rgba(0,0,0,.12);}
.player{height:58px;display:flex;align-items:center;gap:9px;padding:7px}
.avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(#f7c18d,#e69c66);border:3px solid #248ddd;position:relative;overflow:hidden}
.avatar:before{content:"";position:absolute;left:8px;right:8px;top:8px;height:10px;border-radius:9px;background:#9a5522}
.avatar:after{content:"";position:absolute;left:12px;top:18px;width:18px;height:20px;border-radius:9px;background:#ffd3a8}
.name{font-size:16px;font-weight:900;white-space:nowrap;line-height:1.1}
.badge{display:inline-block;background:#63c948;color:#fff;border-radius:7px;padding:2px 7px;font-size:12px;margin-top:3px;font-weight:900}
.balance{height:58px;display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 5px;font-size:22px;font-weight:900}
.coinIcon,.starIcon{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff4a3,#f3ad18 58%,#c77e09);box-shadow:inset 0 -2px rgba(0,0,0,.18),0 2px 0 rgba(0,0,0,.12);position:relative;flex:0 0 auto}
.coinIcon:after{content:"$";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:#9a5d02;font-size:21px}
.starIcon{border-radius:9px;transform:rotate(45deg);background:linear-gradient(135deg,#6fe7ff,#249bef)}
.starIcon:after{content:"";position:absolute;inset:7px;background:rgba(255,255,255,.2);border-radius:3px}
.plus{width:28px;height:28px;border-radius:8px;background:#54c945;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;margin-left:auto;box-shadow:inset 0 2px rgba(255,255,255,.35),0 2px 0 #39922c}
.settings{height:58px;border-radius:17px;background:linear-gradient(#fff,#edf4ff);display:grid;place-items:center;border:3px solid #fff;box-shadow:0 4px 0 rgba(0,0,0,.13)}
.gear{width:28px;height:28px;border:6px solid #6d7c90;border-radius:50%;position:relative}.gear:before,.gear:after{content:"";position:absolute;left:50%;top:50%;width:38px;height:7px;background:#6d7c90;border-radius:5px;transform:translate(-50%,-50%)}.gear:after{transform:translate(-50%,-50%) rotate(90deg)}
.vehicleInfo{display:grid;grid-template-columns:1fr 148px;gap:10px;margin-bottom:8px;}
.carInfo{height:126px;display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;padding:11px;background:linear-gradient(#fff8e7,#fff2d4)}
.carThumb{height:92px;border-radius:14px;background:#e5f4ff;border:2px solid #d4e6f3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.carThumb img{width:110%;height:110%;object-fit:cover}
.infoTitle{font-size:25px;font-weight:900;line-height:.95;margin-bottom:5px}
.level{display:inline-block;background:#2b97ed;color:#fff;border-radius:8px;padding:4px 9px;font-size:16px;font-weight:900;margin:2px 0 8px}
.infoText{font-size:16px;color:#394760;line-height:1.15}.moneyLine{font-size:23px;font-weight:900;color:#102342;margin-top:4px;display:flex;align-items:center;gap:7px}
.smallCoin{width:24px;height:24px;border-radius:50%;background:#f1ab16;display:inline-block;box-shadow:inset 0 -2px rgba(0,0,0,.14)}
.startBig{height:126px;border-radius:18px;border:3px solid #d89016;background:linear-gradient(#ffe988,#ffc63e);box-shadow:0 5px 0 #d9911e,0 5px 12px rgba(0,0,0,.18);display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:24px;font-weight:900;color:#13518a;position:relative}
.startBig .sheetIcon{width:39px;height:45px;border-radius:7px;background:#fff;border:3px solid #9a8063;margin-bottom:7px;position:relative}.startBig .sheetIcon:before{content:"";position:absolute;left:8px;right:8px;top:11px;height:4px;background:#9a8063;box-shadow:0 10px 0 #9a8063,0 20px 0 #9a8063}
.notice{position:absolute;right:-12px;top:-14px;width:34px;height:34px;border-radius:50%;background:#f4503d;color:#fff;display:grid;place-items:center;font-size:20px;border:2px solid rgba(0,0,0,.15)}

.trip{background:linear-gradient(#fffdf3,#fff6e1);border:3px solid rgba(255,255,255,.95);border-radius:20px;padding:12px 15px 13px;margin-bottom:8px;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.tripTop{display:flex;align-items:center;justify-content:space-between;font-weight:900;color:#102342;font-size:16px;margin-bottom:6px}.tripTitle{font-size:26px;text-align:center;flex:1}
.roundIcon{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;color:white;font-weight:900;box-shadow:inset 0 2px rgba(255,255,255,.5),0 3px 0 rgba(0,0,0,.15)}.warehouse{background:#278be6}.pin{background:#f34d66}
.progress{position:relative;height:33px;margin:0 60px 4px;background:#cfc9bb;border-radius:16px;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)}.fill{position:absolute;left:0;top:0;bottom:0;width:0%;border-radius:16px;background:linear-gradient(90deg,#5fd445,#8be75c);transition:width .4s linear}.miniTruck{position:absolute;top:-8px;left:0;width:42px;height:35px;transform:translateX(-50%);transition:left .4s linear;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
.timerLabel{text-align:center;font-size:15px;color:#777;line-height:1}.timer{text-align:center;font-size:36px;font-weight:900;letter-spacing:1px;color:#102342;line-height:1.05}
.rewardPanel{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#edffdf,#d6f8c5);border:3px solid rgba(255,255,255,.95);border-radius:18px;padding:10px 16px;margin-bottom:9px;box-shadow:0 4px 0 rgba(0,0,0,.12)}.rewardTitle{font-size:22px;font-weight:900;color:#18723c}.rewardValue{display:flex;align-items:center;gap:10px;font-size:34px;font-weight:900;color:#278842}.mainBtn{width:150px;height:58px;border:0;border-radius:18px;background:linear-gradient(#84e25e,#42b91f);box-shadow:inset 0 3px rgba(255,255,255,.45),0 6px 0 #2e871b,0 9px 12px rgba(0,0,0,.22);font-size:25px;font-weight:900;color:white;text-shadow:0 2px rgba(0,0,0,.22)}.mainBtn.blue{background:linear-gradient(#6bd1ff,#188df6);box-shadow:inset 0 3px rgba(255,255,255,.45),0 6px 0 #1167bf,0 9px 12px rgba(0,0,0,.22)}.mainBtn:active{transform:translateY(5px);box-shadow:inset 0 3px rgba(255,255,255,.45),0 1px 0 #2e871b}
.garage{background:linear-gradient(#fff9e9,#fff2d6);border:3px solid rgba(255,255,255,.95);border-radius:20px;padding:14px 14px 16px;margin-bottom:12px;box-shadow:0 4px 0 rgba(0,0,0,.12)}.garageHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.garageHead h2{margin:0;font-size:28px;line-height:1}.buyBtn{height:38px;border:0;border-radius:12px;padding:0 14px;background:#248eec;color:#fff;font-size:16px;font-weight:900;box-shadow:0 4px 0 #1465b3}.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.slot{height:86px;border:3px solid #ccc;border-radius:13px;background:#eee4d4;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}.slot.active{background:#e9ffe1;border-color:#52ba58}.slot img{width:102%;height:102%;object-fit:cover}.slot .lv{position:absolute;left:5px;bottom:5px;background:#35ad62;color:white;font-weight:900;border-radius:7px;padding:3px 7px;font-size:14px}.lock{position:absolute;right:5px;bottom:5px;width:25px;height:25px;border-radius:50%;background:rgba(0,0,0,.35)}.plusSlot{font-size:52px;color:#888;border:3px dashed #c7bcaa;background:#fff9ec}
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:var(--w);height:78px;padding:8px 12px calc(env(safe-area-inset-bottom) + 8px);display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:#0d355f;box-shadow:0 -8px 22px rgba(0,0,0,.25);z-index:5}.navItem{border:0;border-radius:18px;background:transparent;color:#d7e2ee;font-weight:900;font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.navItem.active{background:linear-gradient(#2d9bff,#126ed0);color:white;box-shadow:0 4px 0 #0b539c}.navIcon{width:24px;height:20px;position:relative}.navIcon.car:before{content:"";position:absolute;left:3px;right:3px;bottom:5px;height:10px;border-radius:3px;background:currentColor}.navIcon.car:after{content:"";position:absolute;left:6px;bottom:0;width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:10px 0 0 currentColor}.navIcon.bag:before{content:"";position:absolute;inset:6px 3px 0;border:3px solid currentColor;border-radius:3px}.navIcon.bag:after{content:"";position:absolute;left:7px;right:7px;top:0;height:10px;border:3px solid currentColor;border-bottom:0;border-radius:8px 8px 0 0}.navIcon.shop:before{content:"";position:absolute;left:3px;right:3px;bottom:0;height:14px;background:currentColor;border-radius:2px}.navIcon.shop:after{content:"";position:absolute;left:0;right:0;top:0;height:7px;background:currentColor;border-radius:5px}.navIcon.cup:before{content:"";position:absolute;left:7px;right:7px;top:1px;height:16px;border:5px solid currentColor;border-top:0;border-radius:0 0 9px 9px}.navIcon.ref:before{content:"";position:absolute;left:2px;top:2px;width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:12px 0 0 currentColor,6px 12px 0 currentColor}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:20}.modal.show{display:flex}.sheet{width:100%;max-width:430px;background:#fff6df;border-radius:26px 26px 0 0;padding:22px 18px 28px;border:4px solid white;box-shadow:0 -10px 35px rgba(0,0,0,.3)}.sheet h2{margin:0 0 10px;font-size:28px}.row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.12);padding:13px 4px;font-size:18px}.row b{font-size:20px}.close{width:100%;height:52px;margin-top:16px;border:0;border-radius:16px;background:linear-gradient(#4aa7ff,#156dd3);color:white;font-size:20px;font-weight:900;box-shadow:0 4px 0 #0b4c98}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);max-width:330px;width:calc(100% - 44px);padding:13px 16px;border-radius:18px;background:rgba(13,45,84,.94);color:white;font-weight:900;text-align:center;opacity:0;transition:.25s;z-index:30;box-shadow:0 12px 30px rgba(0,0,0,.3)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){.logo{width:200px;height:38px;font-size:17px}.top{gap:6px}.balance{font-size:19px}.vehicleInfo{grid-template-columns:1fr 128px}.infoTitle{font-size:22px}.hero{height:205px}.tripTitle{font-size:23px}.timer{font-size:32px}.rewardTitle{font-size:19px}.mainBtn{width:135px;font-size:23px}.slots{gap:7px}}
</style>
</head>

<div class="modal" id="modal"><div class="sheet"><h2 id="mTitle"></h2><div id="mBody"></div><button class="close" id="close">ЗАКРЫТЬ</button></div></div>
<script>
const stateKey='cargo-rush-v05-clean';
let s=JSON.parse(localStorage.getItem(stateKey)||'{}');
s.coins=s.coins||0; s.stars=s.stars||0; s.running=s.running||false; s.endsAt=s.endsAt||0; s.duration=s.duration||30*60; s.reward=s.reward||10;
const el=id=>document.getElementById(id);
const coins=el('coins'),stars=el('stars'),timer=el('timer'),fill=el('fill'),dot=el('dot'),mainBtn=el('mainBtn'),topStart=el('topStart'),reward=el('reward'),statusTitle=el('statusTitle');
function save(){localStorage.setItem(stateKey,JSON.stringify(s))}
function fmt(sec){sec=Math.max(0,Math.ceil(sec));let h=String(Math.floor(sec/3600)).padStart(2,'0'),m=String(Math.floor(sec%3600/60)).padStart(2,'0'),x=String(sec%60).padStart(2,'0');return h+':'+m+':'+x}
function progress(p){p=Math.max(0,Math.min(1,p));fill.style.width=(p*100)+'%';dot.style.left=(p*100)+'%'}
function setBtns(text,blue){mainBtn.textContent=text;topStart.querySelector('span:nth-child(2)').textContent=text;mainBtn.classList.toggle('blue',blue)}
function render(){coins.textContent=s.coins.toLocaleString('ru-RU');stars.textContent=s.stars;reward.textContent=s.reward;let now=Date.now();if(s.running){let left=(s.endsAt-now)/1000;if(left<=0){timer.textContent='00:00:00';progress(1);statusTitle.textContent='Рейс завершён';setBtns('ЗАБРАТЬ',false)}else{timer.textContent=fmt(left);progress(1-left/s.duration);statusTitle.textContent='Машина в пути';setBtns('В ПУТИ',false)}}else{timer.textContent=fmt(s.duration);progress(0);statusTitle.textContent='Машина стоит';setBtns('ПОЕХАЛИ',true)}}
function action(){let now=Date.now();if(s.running&&now>=s.endsAt){s.coins+=s.reward;s.running=false;s.endsAt=0;toast('Награда забрана: +'+s.reward+' Cargo');save();render();return} if(s.running){toast('Машина уже в пути');return} s.running=true;s.endsAt=Date.now()+s.duration*1000;toast('Рейс запущен');save();render()}
mainBtn.onclick=action; topStart.onclick=action; setInterval(render,1000); render();
function toast(t){const x=el('toast');x.textContent=t;x.classList.add('show');clearTimeout(window.__to);window.__to=setTimeout(()=>x.classList.remove('show'),1700)}
const modal=el('modal'),mt=el('mTitle'),mb=el('mBody');el('close').onclick=()=>modal.classList.remove('show');
function openModal(type){if(type==='home')return;if(type==='shop'){mt.textContent='Автосалон';mb.innerHTML='<div class="row"><b>Mini Van</b><span>$10</span></div><div class="row"><b>Cargo Truck</b><span>$25</span></div><div class="row"><b>Heavy Truck</b><span>$100</span></div><div class="row"><b>Комиссия рынка</b><span>5%</span></div>';}else if(type==='top'){mt.textContent='Лидеры недели';mb.innerHTML='<div class="row"><b>RoadKing</b><span>248 500 Cargo</span></div><div class="row"><b>TruckBoss</b><span>201 900 Cargo</span></div><div class="row"><b>Azat</b><span>174 300 Cargo</span></div>';}else if(type==='refs'){mt.textContent='Рефералы';mb.innerHTML='<div class="row"><b>Ваша ссылка</b><span>готовится</span></div><div class="row"><b>Бонус другу</b><span>100 Cargo</span></div><div class="row"><b>Ваш бонус</b><span>100 Cargo</span></div>';}else{mt.textContent='Гараж';mb.innerHTML='<div class="row"><b>Мини-фургон</b><span>Lv. 1</span></div><div class="row"><b>Рейс</b><span>30 минут</span></div><div class="row"><b>Награда</b><span>10 Cargo</span></div><div class="row"><b>Следующий слот</b><span>$5</span></div>';}modal.classList.add('show')}
document.querySelectorAll('[data-modal]').forEach(b=>b.onclick=()=>openModal(b.dataset.modal));
</script>
